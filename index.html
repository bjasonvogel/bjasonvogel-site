<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jason Vogel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --accent: #4f8ef7;
      --text: #e8e8e8;
      --muted: #888;
      --border: #2a2a2a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 3.5rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .avatar-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 1.75rem;
    }

    .avatar {
      width: 120%;
      height: 120%;
      margin: -10%;
      display: block;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .title {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 2.25rem;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 2.25rem;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.7rem 1.5rem;
      border-radius: 8px;
      transition: opacity 0.15s;
    }

    .cta:hover { opacity: 0.85; }

    .cta svg {
      flex-shrink: 0;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar-wrap"><img class="avatar" src="profile.png" alt="Jason Vogel" /></div>
    <h1>Jason Vogel</h1>
    <p class="title">Product Management &amp; Technology Leader</p>
    <hr class="divider" />
    <a class="cta" href="https://www.linkedin.com/in/bjasonvogel/" target="_blank" rel="noopener noreferrer">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20.447 20.452H17.21v-5.569c0-1.328-.024-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.984V9h3.102v1.561h.044c.432-.818 1.487-1.681 3.061-1.681 3.272 0 3.876 2.154 3.876 4.956v6.616zM5.337 7.433a1.8 1.8 0 1 1 0-3.601 1.8 1.8 0 0 1 0 3.601zm1.554 13.019H3.783V9h3.108v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      Connect on LinkedIn
    </a>
    <p class="footer">© 2026 Jason Vogel</p>
  </div>
</body>
</html>
